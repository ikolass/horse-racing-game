<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" role="img" aria-label="Running horse">
  <!-- Body -->
  <ellipse cx="50" cy="46" rx="28" ry="16" fill="currentColor"/>
  <!-- Neck -->
  <path fill="currentColor" d="M66,38 C68,32 72,24 70,16 C68,14 64,14 62,16 C64,24 62,32 60,38 Z"/>
  <!-- Head -->
  <ellipse cx="70" cy="14" rx="9" ry="7" transform="rotate(20,70,14)" fill="currentColor"/>
  <!-- Ear -->
  <polygon points="74,8 77,3 80,8" fill="currentColor"/>
  <!-- Muzzle extension -->
  <ellipse cx="76" cy="17" rx="5" ry="4" transform="rotate(20,76,17)" fill="currentColor"/>
  <!-- Tail -->
  <path fill="currentColor" d="M22,42 C14,38 8,44 6,52 C10,56 16,50 18,46 C20,50 18,58 22,60 C26,54 24,44 22,42 Z"/>
  <!-- Front right leg (extended forward) -->
  <rect x="62" y="60" width="5" height="18" rx="2" fill="currentColor" transform="rotate(-15,64,60)"/>
  <!-- Front left leg (tucked) -->
  <rect x="54" y="60" width="5" height="16" rx="2" fill="currentColor" transform="rotate(10,56,60)"/>
  <!-- Back right leg (extended back) -->
  <rect x="33" y="60" width="5" height="18" rx="2" fill="currentColor" transform="rotate(15,35,60)"/>
  <!-- Back left leg (tucked forward) -->
  <rect x="40" y="60" width="5" height="16" rx="2" fill="currentColor" transform="rotate(-5,42,60)"/>
  <!-- Mane -->
  <path fill="currentColor" d="M63,16 C60,20 58,26 60,32 C62,28 64,22 66,18 Z"/>
</svg>
